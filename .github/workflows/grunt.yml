---
# yamllint disable rule:line-length
name: grunt
"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: grunt-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
        java: [17]
        node: [18]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: ${{ matrix.java }}
      - name: Install phino (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          curl -fsSL -o phino http://phino.objectionary.com/releases/ubuntu-24.04/phino-latest
          chmod +x phino
          sudo mv phino /usr/local/bin/phino
      - name: Install phino (macOS)
        if: matrix.os == 'macos-15'
        run: |
          curl -fsSL -o phino http://phino.objectionary.com/releases/macos-15/phino-latest
          chmod +x phino
          sudo mv phino /usr/local/bin/phino
      - run: npm install
      - run: npx grunt
